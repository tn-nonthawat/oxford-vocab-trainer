<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account – Oxford 3000 Vocabulary Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%); }
    input:focus { outline: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-sm">

    <!-- Branding -->
    <div class="text-center mb-8 select-none">
      <div class="text-6xl mb-3">📚</div>
      <h1 class="text-2xl font-extrabold text-blue-800 leading-tight">
        Oxford 3000
      </h1>
      <p class="text-sm text-gray-400 mt-1">Vocabulary Trainer</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">

      <h2 class="text-xl font-bold text-gray-800 mb-1">Create your account</h2>
      <p class="text-sm text-gray-400 mb-7">
        Start learning the Oxford 3000 with spaced repetition.
      </p>

      <!-- Error banner -->
      {% if error %}
      <div class="mb-5 flex items-start gap-2.5 px-4 py-3 rounded-xl
                  bg-red-50 border border-red-200 text-sm text-red-700">
        <span class="shrink-0 mt-0.5">⚠️</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <!-- Form -->
      <form method="POST" action="/register" novalidate>
        <div class="space-y-5">

          <div>
            <label for="username"
                   class="block text-xs font-bold text-gray-500
                          uppercase tracking-wider mb-1.5">
              Username
            </label>
            <input id="username" name="username" type="text"
                   placeholder="At least 3 characters"
                   autocomplete="username" required
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-3
                          text-gray-800 text-sm font-medium
                          focus:border-blue-400 transition-colors duration-150">
          </div>

          <div>
            <label for="password"
                   class="block text-xs font-bold text-gray-500
                          uppercase tracking-wider mb-1.5">
              Password
            </label>
            <input id="password" name="password" type="password"
                   placeholder="At least 6 characters"
                   autocomplete="new-password" required
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-3
                          text-gray-800 text-sm font-medium
                          focus:border-blue-400 transition-colors duration-150">
          </div>

          <div>
            <label for="confirm"
                   class="block text-xs font-bold text-gray-500
                          uppercase tracking-wider mb-1.5">
              Confirm Password
            </label>
            <input id="confirm" name="confirm" type="password"
                   placeholder="Repeat your password"
                   autocomplete="new-password" required
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-3
                          text-gray-800 text-sm font-medium
                          focus:border-blue-400 transition-colors duration-150"
                   onkeydown="if(event.key==='Enter')this.form.submit()">
          </div>

          <!-- Password rules hint -->
          <p class="text-xs text-gray-400 -mt-1">
            Password must be at least 6 characters.
          </p>

          <button type="submit"
                  class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-95
                         text-white font-bold py-3 rounded-xl shadow-md
                         transition-all duration-150 cursor-pointer
                         flex items-center justify-center gap-2">
            Create Account
            <span class="text-lg">✓</span>
          </button>

        </div>
      </form>

      <hr class="border-gray-100 my-6" />

      <p class="text-center text-sm text-gray-500">
        Already have an account?
        <a href="/login"
           class="font-bold text-blue-600 hover:text-blue-700 transition-colors">
          Sign in
        </a>
      </p>
    </div>

    <p class="text-center text-xs text-gray-300 mt-6 select-none">
      American Oxford 3000 · CEFR A1–B2
    </p>
  </div>

</body>
</html>
